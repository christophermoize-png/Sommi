<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sommi">
<meta name="theme-color" content="#2c2420">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232c2420'/><text y='68' x='50' text-anchor='middle' font-size='55'>🍷</text></svg>">
<title>Sommi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf6f1;
    --dark: #2c2420;
    --dark2: #3d322c;
    --text: #2c2420;
    --text2: #5c4e42;
    --text3: #8a7968;
    --text4: #a89888;
    --warm: #f5efe8;
    --border: #ece6de;
    --border2: #e8e0d8;
    --white: #fff;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', Helvetica, sans-serif;
    --prime: #4a7c59;
    --prime-bg: #e8f5e9;
    --soon: #c17847;
    --soon-bg: #fff3e0;
    --hold: #5c6b7a;
    --hold-bg: #eceff1;
    --past: #a94442;
    --past-bg: #fce4e4;
    --unknown: #888;
    --unknown-bg: #f0f0f0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: var(--serif);
    background: var(--bg);
    color: var(--text);
    max-width: 600px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  @media (min-width: 768px) {
    body { max-width: 720px; }
  }
  button { cursor: pointer; border: none; background: none; font-family: inherit; }

  /* Auth Screen */
  .auth-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; min-height: 100dvh;
    padding: 40px 24px;
    background: linear-gradient(180deg, var(--dark) 0%, var(--dark2) 100%);
    color: var(--warm);
    text-align: center;
  }
  .auth-logo { font-size: 60px; margin-bottom: 16px; }
  .auth-title { font-size: 36px; font-weight: 700; font-family: var(--serif); letter-spacing: 3px; margin-bottom: 8px; }
  .auth-sub { font-size: 14px; font-family: var(--sans); opacity: 0.7; margin-bottom: 40px; }
  .auth-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 14px 32px; border-radius: 12px;
    background: var(--white); color: var(--dark);
    font-size: 15px; font-weight: 600; font-family: var(--sans);
    transition: opacity 0.15s; width: 100%; max-width: 280px;
  }
  .auth-btn:active { opacity: 0.8; }
  .auth-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
  .auth-error {
    margin-top: 16px; font-size: 13px; font-family: var(--sans);
    color: #f5a0a0; max-width: 280px;
  }
  .auth-loading { margin-top: 24px; font-size: 14px; font-family: var(--sans); opacity: 0.6; }

  /* Sync indicator */
  .sync-bar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 3px; background: var(--soon);
    z-index: 1000;
    animation: syncPulse 1.2s ease-in-out infinite;
    display: none;
    max-width: 600px; margin: 0 auto;
  }
  @media (min-width: 768px) { .sync-bar { max-width: 720px; } }
  .sync-bar.active { display: block; }
  @keyframes syncPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* User menu */
  .user-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,0.14);
    color: var(--warm);
    font-size: 12px; font-weight: 700; font-family: var(--sans);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; overflow: hidden;
    margin-right: 8px;
  }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .user-menu {
    position: absolute; top: 100%; right: 12px;
    background: var(--white); border-radius: 10px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    padding: 8px 0; min-width: 160px; z-index: 50;
    animation: fadeIn 0.15s ease;
  }
  .user-menu-item {
    display: block; width: 100%; text-align: left;
    padding: 10px 16px; font-size: 13px; font-family: var(--sans);
    color: var(--text); font-weight: 500;
  }
  .user-menu-item:active { background: var(--warm); }
  .user-menu-email {
    padding: 8px 16px; font-size: 11px; font-family: var(--sans);
    color: var(--text3); border-bottom: 1px solid var(--border); margin-bottom: 4px;
  }

  /* Header */
  .header {
    padding: calc(env(safe-area-inset-top, 20px) + 12px) 16px 12px;
    background: linear-gradient(180deg, var(--dark) 0%, var(--dark2) 100%);
    color: var(--warm);
    position: relative;
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .header-left { display: flex; align-items: baseline; gap: 10px; }
  .header-right { display: flex; align-items: center; }
  .logo { font-size: 28px; font-weight: 600; letter-spacing: 2px; font-family: var(--serif); }
  .bottle-count { font-size: 13px; opacity: 0.7; font-family: var(--sans); }
  .add-btn-header {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.14);
    color: var(--warm);
    font-size: 22px; font-weight: 300; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .add-btn-header:active { background: rgba(255,255,255,0.26); }
  .season-banner {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; background: rgba(255,255,255,0.08);
    border-radius: 8px; font-size: 12px; font-family: var(--sans);
  }
  .season-banner span:last-child { opacity: 0.85; line-height: 1.4; }

  /* Tabs (5 tabs) */
  .tabs {
    display: flex; background: var(--white);
    border-bottom: 1px solid var(--border2);
    position: sticky; top: 0; z-index: 10;
  }
  .tab-btn {
    flex: 1; padding: 12px 2px; font-size: 11px; font-family: var(--sans);
    font-weight: 500; color: var(--text3);
    border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .tab-btn.active { color: var(--text); border-bottom-color: #8b6f4e; font-weight: 600; }

  /* Main */
  .main { padding: 16px; }
  .section-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; font-family: var(--serif); }
  .section-sub { font-size: 13px; color: var(--text3); margin-bottom: 16px; font-family: var(--sans); }
  .sub-title { font-size: 16px; font-weight: 600; margin-bottom: 10px; font-family: var(--serif); }

  /* Wine Cards */
  .card {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; background: var(--white); border-radius: 10px;
    margin-bottom: 8px; border: 1px solid var(--border);
    transition: transform 0.1s; cursor: pointer;
  }
  .card:active { transform: scale(0.98); }
  .card-producer { font-size: 14px; font-weight: 700; font-family: var(--serif); letter-spacing: 0.3px; }
  .card-name { font-size: 13px; color: var(--text2); margin-top: 2px; font-family: var(--sans); }
  .card-meta { font-size: 11px; color: var(--text4); margin-top: 3px; font-family: var(--sans); }
  .card-right { margin-left: 12px; flex-shrink: 0; }
  .card-body { flex: 1; min-width: 0; }

  /* Status Badges */
  .badge {
    font-size: 10px; font-weight: 600; font-family: var(--sans);
    padding: 4px 10px; border-radius: 20px; white-space: nowrap; letter-spacing: 0.3px;
    display: inline-block;
  }
  .badge-lg { font-size: 12px; padding: 8px 14px; margin-top: 12px; }
  .badge-prime { background: var(--prime-bg); color: var(--prime); }
  .badge-soon { background: var(--soon-bg); color: var(--soon); }
  .badge-hold { background: var(--hold-bg); color: var(--hold); }
  .badge-past { background: var(--past-bg); color: var(--past); }
  .badge-unknown { background: var(--unknown-bg); color: var(--unknown); }

  /* Region Headers */
  .region-header {
    font-size: 15px; font-weight: 600; color: var(--text3);
    margin: 20px 0 10px; font-family: var(--serif);
    letter-spacing: 1px; text-transform: uppercase;
    border-bottom: 1px solid var(--border2); padding-bottom: 6px;
  }

  /* Divider */
  .divider { height: 1px; background: var(--border2); margin: 20px 0; }

  /* Quick Pairing */
  .quick-pair {
    background: var(--white); border-radius: 10px; padding: 14px 16px; border: 1px solid var(--border);
  }
  .quick-pair-wine { font-size: 13px; font-weight: 600; margin-bottom: 8px; font-family: var(--serif); }
  .pair-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .pair-chip {
    font-size: 11px; font-family: var(--sans); padding: 5px 10px;
    background: var(--warm); border-radius: 16px; color: var(--text2);
  }

  /* Season Cards */
  .season-card { padding: 14px 16px; border-radius: 10px; margin-bottom: 12px; background: var(--white); }
  .season-card.current { background: #faf6f1; }
  .season-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .season-name { font-size: 16px; font-weight: 700; font-family: var(--serif); }
  .now-badge {
    font-size: 9px; font-weight: 700; font-family: var(--sans);
    background: var(--dark); color: var(--bg); padding: 2px 8px;
    border-radius: 10px; letter-spacing: 1px;
  }
  .season-desc { font-size: 12px; color: var(--text3); margin-bottom: 10px; font-family: var(--sans); }
  .mini-wine {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px; background: var(--bg); border-radius: 8px;
    margin-bottom: 4px; cursor: pointer; font-size: 12px;
    font-family: var(--sans); color: var(--dark2);
  }
  .mini-wine:active { background: var(--border2); }
  .mini-arrow { font-size: 12px; color: var(--text3); }
  .season-empty { font-size: 12px; color: #bbb; font-style: italic; font-family: var(--sans); }

  /* Detail View */
  .detail-header { padding: 16px; background: var(--dark); padding-top: calc(env(safe-area-inset-top, 16px) + 8px); }
  .back-btn { color: #d4c4b0; font-size: 14px; font-family: var(--sans); padding: 4px 0; }
  .detail-card { padding: 20px 16px; }
  .detail-region { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; font-family: var(--serif); }
  .detail-producer { font-size: 26px; font-weight: 700; margin-bottom: 2px; font-family: var(--serif); line-height: 1.2; }
  .detail-name { font-size: 15px; color: var(--text2); font-family: var(--sans); }
  .detail-meta { display: flex; gap: 8px; font-size: 12px; color: var(--text3); margin-top: 14px; font-family: var(--sans); flex-wrap: wrap; }
  .detail-notes {
    font-size: 14px; line-height: 1.6; color: var(--dark2); margin-top: 16px;
    font-family: var(--sans); background: var(--white); padding: 14px;
    border-radius: 10px; border: 1px solid var(--border);
  }
  .pairing-section { margin-top: 20px; }
  .pair-label { font-size: 14px; font-weight: 600; margin-bottom: 8px; font-family: var(--serif); }
  .drank-btn {
    margin-top: 24px; width: 100%; padding: 14px; font-size: 14px;
    font-family: var(--sans); font-weight: 600; background: var(--dark);
    color: var(--warm); border-radius: 10px; transition: opacity 0.15s;
  }
  .drank-btn:active { opacity: 0.8; }
  .undo-btn {
    margin-top: 8px; width: 100%; padding: 12px; font-size: 13px;
    font-family: var(--sans); font-weight: 500; background: transparent;
    color: var(--text3); border: 1px solid var(--border); border-radius: 10px;
  }
  .slot-info {
    margin-top: 14px; padding: 12px 14px;
    background: var(--warm); border-radius: 8px;
    font-size: 13px; font-family: var(--sans); color: var(--text2);
    display: flex; align-items: center; gap: 8px;
  }
  .slot-info strong { font-weight: 700; color: var(--dark); }
  .slot-info-icon { font-size: 16px; }

  /* Cabinet View */
  .rack-section { margin-bottom: 22px; }
  .rack-header {
    padding: 10px 14px;
    border-left: 4px solid;
    background: var(--white);
    border-radius: 0 8px 8px 0;
    margin-bottom: 10px;
  }
  .rack-name { font-size: 15px; font-weight: 700; font-family: var(--serif); }
  .rack-desc { font-size: 11px; color: var(--text3); font-family: var(--sans); margin-top: 2px; }
  .rack-pyramid {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    padding: 16px 8px;
    background: var(--warm);
    border-radius: 10px;
    border: 1px solid var(--border2);
  }
  .rack-row { display: flex; gap: 6px; justify-content: center; }

  .slot {
    width: 80px; min-height: 82px;
    border-radius: 6px;
    background: var(--white);
    border: 2px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 6px 4px;
    cursor: pointer;
    transition: transform 0.1s;
    font-family: var(--sans);
    text-align: center;
    position: relative;
  }
  .slot:active { transform: scale(0.95); }
  .slot-empty {
    border: 2px dashed #c8bdb0;
    background: transparent;
    color: var(--text3);
  }
  .slot-empty:active { background: rgba(255,255,255,0.3); }
  .slot-icon { font-size: 18px; line-height: 1; margin-bottom: 3px; }
  .slot-label { font-size: 10px; font-weight: 600; line-height: 1.15; color: var(--dark2); }
  .slot-vintage { font-size: 9px; color: var(--text3); margin-top: 2px; }
  .slot-prime { border-color: var(--prime); }
  .slot-soon { border-color: var(--soon); }
  .slot-hold { border-color: var(--hold); }
  .slot-past { border-color: var(--past); }
  .slot-plus { font-size: 22px; font-weight: 300; line-height: 1; }
  .slot-empty-label { font-size: 9px; margin-top: 3px; color: var(--text3); }

  /* Tier labels (overflow) */
  .tier-header {
    display: flex; align-items: center; gap: 8px;
    margin: 18px 0 8px;
    font-size: 13px;
    font-family: var(--sans);
    color: var(--text2);
    font-weight: 600;
  }
  .tier-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px;
    background: var(--dark); color: var(--warm);
    border-radius: 50%;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }
  .tier-desc { color: var(--text3); font-weight: 400; font-size: 12px; }

  .empty-overflow {
    font-size: 12px; color: var(--text4); font-family: var(--sans);
    font-style: italic; padding: 8px 0;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(44, 36, 32, 0.55);
    z-index: 100;
    display: flex; align-items: flex-end;
    animation: fadeIn 0.18s ease;
  }
  .modal {
    background: var(--bg);
    width: 100%; max-width: 600px;
    margin: 0 auto;
    max-height: 92vh;
    border-radius: 18px 18px 0 0;
    overflow-y: auto;
    animation: slideUp 0.24s ease;
    padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 12px);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-header {
    position: sticky; top: 0; z-index: 2;
    background: var(--bg);
    padding: 14px 16px;
    border-bottom: 1px solid var(--border2);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-title { font-size: 18px; font-weight: 600; font-family: var(--serif); }
  .modal-close {
    font-size: 20px; color: var(--text3);
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .modal-body { padding: 16px; }

  /* Form */
  .form-row { margin-bottom: 12px; }
  .form-label {
    display: block; font-size: 12px; font-weight: 600;
    margin-bottom: 5px; color: var(--text2);
    font-family: var(--sans);
    letter-spacing: 0.3px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--white);
    font-size: 14px;
    font-family: var(--sans);
    color: var(--text);
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none; border-color: var(--text3);
  }
  .form-textarea { resize: vertical; min-height: 70px; }
  .form-row-split { display: flex; gap: 8px; }
  .form-row-split > * { flex: 1; min-width: 0; }
  .form-submit {
    margin-top: 16px; width: 100%; padding: 14px;
    font-size: 14px; font-family: var(--sans); font-weight: 600;
    background: var(--dark); color: var(--warm);
    border-radius: 10px;
  }
  .form-submit:active { opacity: 0.8; }
  .form-submit:disabled { opacity: 0.4; }
  .form-error {
    font-size: 12px; color: var(--past);
    margin-top: 8px; font-family: var(--sans);
    text-align: center;
  }
  .form-hint {
    font-size: 11px; color: var(--text3);
    font-family: var(--sans); margin-top: 4px;
  }

  /* Assign Modal */
  .assign-section-label {
    font-size: 11px; color: var(--text3);
    font-family: var(--sans);
    margin: 18px 0 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .assign-section-label:first-child { margin-top: 0; }
  .assign-empty {
    font-size: 12px; color: var(--text4);
    font-style: italic; padding: 8px 0;
    font-family: var(--sans);
  }
  .assign-clear-btn {
    margin-top: 18px; width: 100%; padding: 12px;
    font-size: 13px; font-family: var(--sans); font-weight: 500;
    background: transparent; color: var(--past);
    border: 1px solid var(--border); border-radius: 10px;
  }

  /* Opened wines section */
  .opened-header { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; }
  .opened-count { font-size: 12px; color: var(--text4); font-family: var(--sans); }
  .opened-card {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px; background: var(--white); border-radius: 10px;
    margin-bottom: 6px; border: 1px solid var(--border); opacity: 0.55;
  }
  .opened-card .card-producer { font-size: 13px; }
  .opened-card .card-name { font-size: 12px; }
  .restore-btn { font-size: 11px; color: var(--soon); font-family: var(--sans); font-weight: 600; padding: 4px 10px; }

  /* Animations */
  .view { display: none; }
  .view.active { display: block; animation: fadeIn 0.15s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Empty state */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-family: var(--sans); font-size: 14px; }

  /* Custom badge */
  .badge-custom {
    background: #ede7dd; color: var(--dark2);
    font-size: 9px; padding: 2px 7px; border-radius: 10px;
    margin-left: 6px; letter-spacing: 0.3px;
    font-family: var(--sans); font-weight: 600;
    text-transform: uppercase;
  }
  @media (min-width: 768px) {
    body { max-width: 720px; }
    .modal { max-width: 720px; }
    .slot { width: 100px; min-height: 96px; }
    .slot-label { font-size: 11px; }
    .slot-vintage { font-size: 10px; }
    .rack-pyramid { padding: 20px 12px; gap: 8px; }
    .rack-row { gap: 10px; }
  }
</style>
</head>
<body>

<div id="syncBar" class="sync-bar"></div>
<div id="app"></div>
<div id="modal"></div>

<script type="module">
// ─── FIREBASE ───
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB1__e8-xHRle5tRmOQ2SNrSDd3C-AbYWI",
  authDomain: "sommi-ee1e0.firebaseapp.com",
  projectId: "sommi-ee1e0",
  storageBucket: "sommi-ee1e0.firebasestorage.app",
  messagingSenderId: "1098336498516",
  appId: "1:1098336498516:web:fa9b394ac12e426b9bfe3c"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
const provider = new GoogleAuthProvider();

// Enable offline persistence
enableIndexedDbPersistence(db).catch(() => {});

let currentUser = null;
let unsubFirestore = null;
let saving = false;

// ─── FIRESTORE SYNC ───
function showSync(on) {
  document.getElementById("syncBar").classList.toggle("active", on);
}

async function saveToFirestore() {
  if (!currentUser || saving) return;
  saving = true;
  showSync(true);
  try {
    await setDoc(doc(db, "cellars", currentUser.uid), {
      openedIds: state.openedIds,
      customWines: state.customWines,
      rackAssignments: state.rackAssignments,
      lastModified: Date.now(),
    });
  } catch (e) {
    console.error("Firestore save error:", e);
  }
  saving = false;
  showSync(false);
}

function startFirestoreListener() {
  if (unsubFirestore) unsubFirestore();
  if (!currentUser) return;

  unsubFirestore = onSnapshot(
    doc(db, "cellars", currentUser.uid),
    (snap) => {
      if (!snap.exists()) {
        // First sign-in: migrate localStorage if present, otherwise use defaults
        migrateLocalStorage();
        return;
      }
      const data = snap.data();
      // Only apply remote changes if we're not in the middle of a local save
      if (!saving) {
        state.openedIds = data.openedIds || [];
        state.customWines = data.customWines || [];
        state.rackAssignments = data.rackAssignments || { ...RACK_DEFAULTS };
        render();
      }
    },
    (err) => {
      console.error("Firestore listener error:", err);
    }
  );
}

async function migrateLocalStorage() {
  // Pull existing data from localStorage (from v3 or earlier use on this device)
  let openedIds = [];
  let customWines = [];
  let rackAssignments = { ...RACK_DEFAULTS };

  try {
    const lsOpened = localStorage.getItem("cellar_opened");
    if (lsOpened) openedIds = JSON.parse(lsOpened);
  } catch {}
  try {
    const lsCustom = localStorage.getItem("cellar_custom");
    if (lsCustom) customWines = JSON.parse(lsCustom);
  } catch {}
  try {
    const lsRack = localStorage.getItem("cellar_rack");
    if (lsRack) rackAssignments = JSON.parse(lsRack);
  } catch {}

  state.openedIds = openedIds;
  state.customWines = customWines;
  state.rackAssignments = rackAssignments;

  // Write to Firestore
  await saveToFirestore();

  // Clear localStorage — Firestore is the source of truth now
  localStorage.removeItem("cellar_opened");
  localStorage.removeItem("cellar_custom");
  localStorage.removeItem("cellar_rack");

  render();
}

// Debounced save
let saveTimer = null;
function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveToFirestore(), 300);
}

// ─── AUTH ───
async function handleSignIn() {
  state.authState = "loading";
  render();
  try {
    // Try popup first; fall back to redirect on mobile (popup may be blocked)
    try {
      await signInWithPopup(auth, provider);
    } catch (popupErr) {
      if (popupErr.code === "auth/popup-blocked" || popupErr.code === "auth/popup-closed-by-user") {
        await signInWithRedirect(auth, provider);
      } else {
        throw popupErr;
      }
    }
  } catch (err) {
    console.error("Sign-in error:", err);
    state.authState = "signed-out";
    state._authError = err.message;
    render();
  }
}

function handleSignOut() {
  if (unsubFirestore) { unsubFirestore(); unsubFirestore = null; }
  signOut(auth);
}

// Check redirect result on load (for mobile sign-in flow)
getRedirectResult(auth).catch(() => {});

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  if (user) {
    state.authState = "signed-in";
    startFirestoreListener();
  } else {
    state.authState = "signed-out";
    state.openedIds = [];
    state.customWines = [];
    state.rackAssignments = { ...RACK_DEFAULTS };
    if (unsubFirestore) { unsubFirestore(); unsubFirestore = null; }
  }
  render();
});

// ─── DATA HELPERS ───
function getAllWines() {
  return [...WINES, ...state.customWines];
}

function findWine(id) {
  return getAllWines().find(w => w.id === id);
}

function getActiveWines() {
  return getAllWines().filter(w => !state.openedIds.includes(w.id));
}

function getOpenedWines() {
  return getAllWines().filter(w => state.openedIds.includes(w.id));
}

function getSlotForWine(id) {
  for (const [slot, wid] of Object.entries(state.rackAssignments)) {
    if (wid === id) return slot;
  }
  return null;
}

function formatSlot(slot) {
  if (!slot) return "";
  const [rk, row, col] = slot.split("-");
  const m = RACK_META[rk];
  const rowN = ROW_NAMES[row];
  if (row === "T") return `${m.side} Rack · Top`;
  return `${m.side} Rack · ${rowN}, Pos ${col}`;
}

function clearSlotForWine(id) {
  for (const [slot, wid] of Object.entries(state.rackAssignments)) {
    if (wid === id) {
      state.rackAssignments[slot] = null;
    }
  }
}

function isSlotted(id) { return !!getSlotForWine(id); }
function isCustom(id)  { return state.customWines.some(w => w.id === id); }

// ─── HELPERS ───
function getSeason() {
  const m = new Date().getMonth();
  if (m >= 2 && m <= 4) return "spring";
  if (m >= 5 && m <= 7) return "summer";
  if (m >= 8 && m <= 10) return "fall";
  return "winter";
}

function getStatus(w) {
  const yr = new Date().getFullYear();
  if (!w.drinkFrom || !w.drinkTo) return "unknown";
  if (yr < w.drinkFrom) return "hold";
  if (yr >= w.drinkFrom && yr <= w.drinkTo - 2) return "prime";
  if (yr > w.drinkTo - 2 && yr <= w.drinkTo) return "soon";
  return "past";
}

function statusLabel(s) {
  return { prime: "● Prime", soon: "▲ Drink Soon", hold: "◆ Hold", past: "! Past Peak", unknown: "? Needs Info" }[s];
}
function statusClass(s) {
  return { prime: "badge-prime", soon: "badge-soon", hold: "badge-hold", past: "badge-past", unknown: "badge-unknown" }[s];
}
function statusSlotClass(s) {
  return { prime: "slot-prime", soon: "slot-soon", hold: "slot-hold", past: "slot-past", unknown: "" }[s] || "";
}

function esc(str) {
  if (str == null) return "";
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

function truncateProducer(s, maxLen) {
  if (!s) return "";
  return s.length > maxLen ? s.slice(0, maxLen - 1) + "…" : s;
}

// ─── SCORING ───
function getTonightPicks() {
  const s = SEASONS[getSeason()];
  return getActiveWines()
    .filter(w => w.drinkFrom && w.drinkTo)
    .map(w => {
      let score = 0;
      const st = getStatus(w);
      if (st === "prime") score += 10;
      if (st === "soon") score += 15;
      if (s.ideal.includes(w.varietal)) score += 8;
      if (s.bodyPref.includes(w.body)) score += 5;
      return { ...w, score };
    })
    .sort((a, b) => b.score - a.score)
    .slice(0, 3);
}

function getSeasonalPicks(seasonKey) {
  const s = SEASONS[seasonKey];
  return getActiveWines()
    .filter(w => w.drinkFrom && w.drinkTo && !["past","unknown"].includes(getStatus(w)))
    .filter(w => s.ideal.includes(w.varietal) || s.bodyPref.includes(w.body))
    .slice(0, 3);
}

function getAlerts() {
  return getActiveWines().filter(w => ["soon","past","unknown"].includes(getStatus(w)));
}

function getByRegion() {
  const groups = {};
  getActiveWines().forEach(w => {
    const key = (FLAGS[w.country] || "🍷") + " " + (w.region || "Other") + ", " + (w.country || "Other");
    if (!groups[key]) groups[key] = [];
    groups[key].push(w);
  });
  return groups;
}

        </div>
      </div>
      ${state.userMenuOpen ? `<div class="user-menu" id="userMenu">
        <div class="user-menu-email">${esc(currentUser?.email || "")}</div>
        <button class="user-menu-item" id="signOutBtn">Sign out</button>
      </div>` : ''}
      <div class="season-banner">
        <span style="font-size:18px">${si.icon}</span>
        <span>${si.label} · ${si.desc}</span>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab-btn ${state.tab==='tonight'?'active':''}" data-tab="tonight">Tonight</button>
      <button class="tab-btn ${state.tab==='cellar'?'active':''}" data-tab="cellar">Cellar</button>
      <button class="tab-btn ${state.tab==='cabinet'?'active':''}" data-tab="cabinet">Cabinet</button>
      <button class="tab-btn ${state.tab==='seasons'?'active':''}" data-tab="seasons">Seasons</button>
      <button class="tab-btn ${state.tab==='alerts'?'active':''}" data-tab="alerts">Alerts${alerts.length ? ' ('+alerts.length+')' : ''}</button>
    </nav>
    <main class="main">
  `;

  if (state.tab === "tonight") html += renderTonight();
  else if (state.tab === "cellar") html += renderCellar();
  else if (state.tab === "cabinet") html += renderCabinet();
  else if (state.tab === "seasons") html += renderSeasons();
  else if (state.tab === "alerts") html += renderAlerts();

  html += `</main>`;
  app.innerHTML = html;
  bindMain();

  // Modal
  if (state.modal === "add") {
    modalEl.innerHTML = renderAddForm();
    bindAddForm();
  } else if (state.modal === "assign") {
    modalEl.innerHTML = renderAssignModal();
    bindAssignModal();
  } else {
    modalEl.innerHTML = "";
  }
}

function renderWineCard(w) {
  const st = getStatus(w);
  const customTag = isCustom(w.id) ? '<span class="badge-custom">Added</span>' : '';
  return `<div class="card" data-wine-id="${w.id}">
    <div class="card-body">
      <div class="card-producer">${esc(w.producer)}${customTag}</div>
      <div class="card-name">${esc(w.name)}${w.vintage ? ', '+w.vintage : ''}</div>
      <div class="card-meta">${esc(w.varietal)}${w.subRegion ? ' · '+esc(w.subRegion) : ''}</div>
    </div>
    <div class="card-right">
      <span class="badge ${statusClass(st)}">${statusLabel(st)}</span>
    </div>
  </div>`;
}

function renderTonight() {
  const picks = getTonightPicks();
  const topPick = picks[0];
  const pairs = topPick ? (PAIRINGS[topPick.varietal] || []).slice(0, 3) : [];

  let html = `<h2 class="section-title">What to Open Tonight</h2>
    <p class="section-sub">Based on season, drinking window &amp; varietal match</p>`;

  if (!picks.length) {
    html += `<div class="empty-state">No wines available. Tap + to add your first bottle.</div>`;
    return html;
  }

  picks.forEach(w => html += renderWineCard(w));

  if (topPick && pairs.length) {
    html += `<div class="divider"></div>
      <h3 class="sub-title">Quick Pairing Ideas</h3>
      <div class="quick-pair">
        <div class="quick-pair-wine">${esc(topPick.producer)} ${esc(topPick.name)}</div>
        <div class="pair-grid">${pairs.map(p => `<span class="pair-chip">${esc(p)}</span>`).join('')}</div>
      </div>`;
  }
  return html;
}

function renderCellar() {
  const groups = getByRegion();
  const opened = getOpenedWines();
  let html = '';

  if (!Object.keys(groups).length && !opened.length) {
    html += `<div class="empty-state">Your cellar is empty. Tap + to add a bottle.</div>`;
    return html;
  }

  Object.entries(groups).forEach(([region, wines]) => {
    html += `<h2 class="region-header">${region}</h2>`;
    wines.forEach(w => html += renderWineCard(w));
  });

  if (opened.length) {
    html += `<div class="opened-header">
      <h2 class="region-header" style="border:none;margin-bottom:4px">Opened</h2>
      <span class="opened-count">${opened.length} bottle${opened.length>1?'s':''}</span>
    </div>`;
    opened.forEach(w => {
      html += `<div class="opened-card">
        <div>
          <div class="card-producer">${esc(w.producer)}</div>
          <div class="card-name">${esc(w.name)}${w.vintage ? ', '+w.vintage : ''}</div>
        </div>
        <button class="restore-btn" data-restore-id="${w.id}">Restore</button>
      </div>`;
    });
  }
  return html;
}

function renderCabinet() {
  const assignments = state.rackAssignments;
  const slottedIds = Object.values(assignments).filter(v => v != null);

  let html = `<h2 class="section-title">Cabinet Layout</h2>
    <p class="section-sub">Three 6-bottle pyramid racks · tap to view or assign</p>`;

  ["L","C","R"].forEach(rk => {
    const meta = RACK_META[rk];
    html += `<div class="rack-section">
      <div class="rack-header" style="border-color:${meta.color}">
        <div class="rack-name" style="color:${meta.color}">${meta.side} Rack — ${meta.name}</div>
        <div class="rack-desc">${meta.desc}</div>
      </div>
      <div class="rack-pyramid">
        <div class="rack-row">${renderSlot(rk,"T",1)}</div>
        <div class="rack-row">${renderSlot(rk,"M",1)}${renderSlot(rk,"M",2)}</div>
        <div class="rack-row">${renderSlot(rk,"B",1)}${renderSlot(rk,"B",2)}${renderSlot(rk,"B",3)}</div>
      </div>
    </div>`;
  });

  html += `<div class="divider"></div>
    <h2 class="section-title">Overflow Rotation</h2>
    <p class="section-sub">Pull from here as cabinet slots open up</p>`;

  const tieredIds = OVERFLOW_TIERS.flatMap(t => t.ids);

  OVERFLOW_TIERS.forEach((tier, i) => {
    const availableInTier = tier.ids
      .filter(id => !state.openedIds.includes(id) && !slottedIds.includes(id))
      .map(findWine)
      .filter(Boolean);

    html += `<div class="tier-header">
      <span class="tier-num">${i+1}</span>
      <span>${esc(tier.name)}</span>
      <span class="tier-desc">— ${esc(tier.desc)}</span>
    </div>`;
    if (availableInTier.length) {
      availableInTier.forEach(w => { html += renderWineCard(w); });
    } else {
      html += `<div class="empty-overflow">All slotted or opened</div>`;
    }
  });

  const unassigned = getAllWines().filter(w =>
    !state.openedIds.includes(w.id) &&
    !slottedIds.includes(w.id) &&
    !tieredIds.includes(w.id)
  );
  if (unassigned.length) {
    html += `<div class="divider"></div>
      <h3 class="sub-title">Unassigned</h3>
      <p class="section-sub">Added bottles · tap to view or assign to a slot</p>`;
    unassigned.forEach(w => html += renderWineCard(w));
  }

  return html;
}

function renderSlot(rk, row, col) {
  const slotKey = `${rk}-${row}-${col}`;
  const wineId = state.rackAssignments[slotKey];
  const w = wineId ? findWine(wineId) : null;
  const isOpened = w && state.openedIds.includes(w.id);

  if (!w || isOpened) {
    return `<div class="slot slot-empty" data-assign-slot="${slotKey}">
      <div class="slot-plus">+</div>
      <div class="slot-empty-label">Empty</div>
    </div>`;
  }

  const st = getStatus(w);
  const cls = statusSlotClass(st);
  const label = truncateProducer(w.producer.replace("Benziger Estate", "Benziger"), 12);
  return `<div class="slot slot-filled ${cls}" data-wine-id="${w.id}">
    <div class="slot-icon">🍷</div>
    <div class="slot-label">${esc(label)}</div>
    <div class="slot-vintage">${w.vintage || ""}</div>
  </div>`;
}

function renderSeasons() {
  const current = getSeason();
  let html = `<h2 class="section-title">Seasonal Guide</h2>`;
  Object.entries(SEASONS).forEach(([key, s]) => {
    const picks = getSeasonalPicks(key);
    html += `<div class="season-card ${key===current?'current':''}" style="border-left:3px solid ${s.color}">
      <div class="season-card-head">
        <span style="font-size:20px">${s.icon}</span>
        <span class="season-name" style="color:${s.color}">${s.label}</span>
        ${key===current ? '<span class="now-badge">NOW</span>' : ''}
      </div>
      <p class="season-desc">${s.temp}</p>`;
    if (picks.length) {
      picks.forEach(w => {
        html += `<div class="mini-wine" data-wine-id="${w.id}">
          <span>${esc(w.producer)} — ${esc(w.name)} ${w.vintage||''}</span>
          <span class="mini-arrow">→</span>
        </div>`;
      });
    } else {
      html += `<div class="season-empty">No ideal matches in cellar</div>`;

}

function renderAlerts() {
  const alerts = getAlerts();
  let html = `<h2 class="section-title">Attention Needed</h2>`;

    html += `<p class="section-sub">All bottles are in good shape!</p>`;

    html += `<p class="section-sub">These bottles need action — drink soon or verify info</p>`;
    alerts.forEach(w => html += renderWineCard(w));

// ─── ASSIGN MODAL ───
function renderAssignModal() {
  const slot = state.assignTargetSlot;
  if (!slot) return "";
  const slottedIds = Object.values(state.rackAssignments).filter(v => v != null);
  const tieredIds = OVERFLOW_TIERS.flatMap(t => t.ids);

  const candidates = getAllWines().filter(w =>
    !state.openedIds.includes(w.id) &&
    !slottedIds.includes(w.id)
  );

  const groups = OVERFLOW_TIERS.map(t => ({
    name: t.name,
    wines: t.ids.map(findWine).filter(w => w && candidates.includes(w))
  }));
  const otherCandidates = candidates.filter(w => !tieredIds.includes(w.id));

  let html = `<div class="modal-overlay" id="modalOverlay">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title">Fill: ${esc(formatSlot(slot))}</div>
        <button class="modal-close" id="modalCloseBtn">✕</button>
      </div>
      <div class="modal-body">`;

  let totalShown = 0;
  groups.forEach(g => {
    if (g.wines.length) {
      html += `<div class="assign-section-label">${esc(g.name)}</div>`;
      g.wines.forEach(w => { html += renderWineCard(w); totalShown++; });
    }
  });
  if (otherCandidates.length) {
    html += `<div class="assign-section-label">Other Available</div>`;
    otherCandidates.forEach(w => { html += renderWineCard(w); totalShown++; });
  }

  if (!totalShown) {
    html += `<div class="assign-empty">No unslotted bottles available. Add a new bottle with the + button.</div>`;
  }

  html += `</div></div></div>`;
  return html;
}

// ─── BINDINGS ───
function bindAuth() {
  const btn = document.getElementById("googleSignInBtn");
  if (btn) btn.addEventListener("click", handleSignIn);
}

function bindMain() {
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.tab = btn.dataset.tab;
      render();
    });
  });
  document.querySelectorAll("[data-wine-id]").forEach(el => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = parseInt(el.dataset.wineId, 10);
      if (state.modal === "assign" && state.assignTargetSlot) {
        state.rackAssignments[state.assignTargetSlot] = id;
        scheduleSave();
        state.modal = null;
        state.assignTargetSlot = null;
        render();
        return;
      }
      state.selectedWineId = id;
      render();
    });
  });
  document.querySelectorAll("[data-restore-id]").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.restoreId, 10);
      state.openedIds = state.openedIds.filter(x => x !== id);
      scheduleSave();
      render();
    });
  });
  document.querySelectorAll("[data-assign-slot]").forEach(el => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      state.assignTargetSlot = el.dataset.assignSlot;
      state.modal = "assign";
      render();
    });
  });
  const addBtn = document.getElementById("openAddBtn");
  if (addBtn) addBtn.addEventListener("click", () => {
    state.modal = "add";
    state.assignTargetSlot = null;
    render();
  });
  // User avatar menu
  const avatarBtn = document.getElementById("userAvatarBtn");
  if (avatarBtn) avatarBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    state.userMenuOpen = !state.userMenuOpen;
    render();
  });
  const signOutBtn = document.getElementById("signOutBtn");
  if (signOutBtn) signOutBtn.addEventListener("click", () => {
    state.userMenuOpen = false;
    handleSignOut();
  });
  // Close user menu on outside click
  if (state.userMenuOpen) {
    document.addEventListener("click", () => {
      state.userMenuOpen = false;
      render();
    }, { once: true });
  }
}

function bindDetail() {
  document.getElementById("backBtn").addEventListener("click", () => {
    state.selectedWineId = null;
    render();
  });
  const drankBtn = document.getElementById("drankBtn");
  if (drankBtn) {
    drankBtn.addEventListener("click", () => {
      const id = parseInt(drankBtn.dataset.id, 10);
      state.openedIds.push(id);
      clearSlotForWine(id);
      scheduleSave();
      state.selectedWineId = null;
      render();
    });
  }
}

function bindAddForm() {
  const overlay = document.getElementById("modalOverlay");
  const closeBtn = document.getElementById("modalCloseBtn");
  const closeModal = () => { state.modal = null; state.assignTargetSlot = null; render(); };

  if (overlay) overlay.addEventListener("click", closeModal);
  if (closeBtn) closeBtn.addEventListener("click", closeModal);

  const form = document.getElementById("addWineForm");
  if (!form) return;
  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const errEl = document.getElementById("addFormError");
    errEl.style.display = "none";

    const data = Object.fromEntries(new FormData(form).entries());
    if (!data.producer.trim() || !data.name.trim()) {
      errEl.textContent = "Producer and Wine Name are required.";
      errEl.style.display = "block";
      return;
    }

    const vintage = data.vintage ? parseInt(data.vintage, 10) : null;
    const drinkFrom = data.drinkFrom ? parseInt(data.drinkFrom, 10) : null;
    const drinkTo = data.drinkTo ? parseInt(data.drinkTo, 10) : null;
    if (drinkFrom && drinkTo && drinkTo < drinkFrom) {
      errEl.textContent = "Drink To must be after Drink From.";
      errEl.style.display = "block";
      return;
    }

    const id = Date.now();
    const wine = {
      id,
      producer: data.producer.trim(),
      name: data.name.trim(),
      vintage,
      region: data.region.trim() || "—",
      country: data.country || "Other",
      varietal: data.varietal || "Other",
      subRegion: data.subRegion.trim() || "",
      drinkFrom,
      drinkTo,
      body: data.body || "medium-full",
      tannin: data.tannin || "medium",
      notes: data.notes.trim() || ""
    };

    state.customWines.push(wine);

    if (data.slot) {
      const existing = state.rackAssignments[data.slot];
      if (existing == null || state.openedIds.includes(existing)) {
        state.rackAssignments[data.slot] = id;
      }
    }

    scheduleSave();
    state.modal = null;
    state.assignTargetSlot = null;
    render();
  });
}

function bindAssignModal() {
  const overlay = document.getElementById("modalOverlay");
  const closeBtn = document.getElementById("modalCloseBtn");
  const closeModal = () => { state.modal = null; state.assignTargetSlot = null; render(); };

  if (overlay) overlay.addEventListener("click", closeModal);
  if (closeBtn) closeBtn.addEventListener("click", closeModal);

  document.querySelectorAll("#modal [data-wine-id]").forEach(el => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = parseInt(el.dataset.wineId, 10);
      state.rackAssignments[state.assignTargetSlot] = id;
      scheduleSave();
      state.modal = null;
      state.assignTargetSlot = null;
      render();
    }, { once: true });
  });
}

// ─── INIT ───
render();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
